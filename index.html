<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: rgb(206, 228, 248);
      }

      h2, p{
        margin: 10px;
      }

      ul {
        list-style-type: none;
        margin: 0; 
        padding: 0;
        overflow: hidden;
        background-color: #0E1061;
      }

      ul li {
        float: left; /*change justification of toolbar*/
      }

      ul li a {
        display: block;
        color: white;
        text-align: center;
        padding: 14px 16px;
        text-decoration: none;
      }

      ul li a:hover {
        background-color: #111111;
      }

      img {
        image-rendering: -webkit-optimize-contrast; /* Legacy Safari */
        image-rendering: crisp-edges;
        image-rendering: pixelated;
      }
    </style>
  </head>
  <body>
